# Application Configuration
spring.application.name=bus-ticket-booking
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bus_ticket_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=BusTicketBookingSecretKeyForJWTAuthenticationMustBe256BitsLongForHS256Algorithm2024
jwt.expiration=86400000

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.com.busticket=DEBUG

# Seat Lock Configuration (in minutes)
seat.lock.expiry.minutes=5

# Schedule Configuration
schedule.days.ahead=7
