<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  <g fill="white">
    <!-- Bus body -->
    <rect x="20" y="35" width="60" height="35" rx="5"/>
    <!-- Windows -->
    <rect x="25" y="40" width="12" height="10" rx="2" fill="#6366f1"/>
    <rect x="40" y="40" width="12" height="10" rx="2" fill="#6366f1"/>
    <rect x="55" y="40" width="12" height="10" rx="2" fill="#6366f1"/>
    <rect x="72" y="40" width="6" height="10" rx="2" fill="#6366f1"/>
    <!-- Wheels -->
    <circle cx="32" cy="70" r="8" fill="#1e293b"/>
    <circle cx="32" cy="70" r="4" fill="#6366f1"/>
    <circle cx="68" cy="70" r="8" fill="#1e293b"/>
    <circle cx="68" cy="70" r="4" fill="#6366f1"/>
  </g>
</svg>
